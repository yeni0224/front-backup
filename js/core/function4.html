<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--호이스팅 원리에 의한 함수 호출-->
    <button onclick="message()">click</button> 
    <script>
        function message(){
            let now = new Date();
            document.write(now + '<br>');
            document.write('안녕하세요');
        }
    </script>
</body>
</html>

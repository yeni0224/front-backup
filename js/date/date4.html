<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현재 시각</title>
</head>
<body>
    <div id="clock"></div>
    <script>
        function setClock(){
            let now = new Date();
            let s = (`${now.getHours()} : ${now.getMinutes()} : ${now.getSeconds()}`)
            
            document.getElementById('clock').innerHTML = s;
            //타이머 : 1초가 지나면 시간을 다시 출력한다.
            //settimeout(콜백함수 객체, ms)
            setTimeout(setClock, 1000)//재귀호출
        }
        setClock();
    </script>
</body>
</html>

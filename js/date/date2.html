<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function getLastDayOfMonth(year, month){
            let date = new Date(year, month, 0); //지정한 숫자 달의 마지막 날
            return date.getDate();
        }
        //8월 0일은 없는 날짜이기 때문에
        //달력에 없는 날짜가 지정되면 날짜 순서에 맞게 정상 날짜값(하루 앞)으로 바꿔줌
        //음수 날짜로 지정하면 마지막날에서 - 한 만큼 줄어든 날짜 리턴
        document.write(getLastDayOfMonth(2025, 7)+"<br>");
        document.write(getLastDayOfMonth(2025, 2)+"<br>");
        document.write(getLastDayOfMonth(2024, 2)+"<br>");
    </script>
</body>
</html>

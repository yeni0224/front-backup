<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사용자 정보 조회</title>
</head>
<body>
    <!-- 사용자가 입력한 사용자 ID를 이용해 해당 사용자의 정보를 가져와서 이름과 이메일을 HTML에 출력 -->
  <h2>사용자 정보 검색</h2>
  <input type="number" id="userId" placeholder="사용자 ID 입력" />
  <button id="searchBtn">검색</button>
  <div id="userInfo"></div>
 
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    document.getElementById("searchBtn").addEventListener("click", () => {
      const userId = document.getElementById("userId").value;
      const userInfo = document.getElementById("userInfo");
 
      axios.get(`https://jsonplaceholder.typicode.com/users/${userId}`)
        .then(response => {
          const user = response.data;
          userInfo.innerHTML = `
            <p>이름: <strong>${user.name}</strong></p>
            <p>이메일: <strong>${user.email}</strong></p>
          `;
        })
        .catch(error => {
          userInfo.innerHTML = "<p style='color:red;'>사용자를 찾을 수 없습니다.</p>";
        });
    });
  </script>
</body>
</html>

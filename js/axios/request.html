<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Axios REQUEST 예제</title>
</head>
<body>
  <h2>post글 가져오기</h2>
  <label>글번호</label>
  <input id="id">
  <button id="loadUsers">불러오기2</button>
  <ul id="post"></ul>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    const btn = document.getElementById("loadUsers");
    const list = document.getElementById("userList");

    btn.addEventListener("click", () => {
        let post_id = document.getElementById("id").value;

        if(!post_id){
            alert("번호 입력");
            return false;
        }else if(isNaN(post_id)){
            alert("숫자 입력");
            return false;
        }

        let url = "https://jsonplaceholder.typicode.com/posts/"+post_id;

        axios.request({method: 'get', url:url}            
        ).then(response =>{
           // console.log(response.data);
            const post = document.getElementById("post");
            for (let name in response.data){
                const li = document.createElement("li");
                li.textContent = name + ": " +response.data[name]; 
                post.appendChild(li);
            }
        }).catch(error => {
          alert("오류 발생: " + error);
        });

    });
  </script>
</body>
</html>

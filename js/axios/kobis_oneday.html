<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>kobis api</title>
</head>

<body>
	<input type="date" id="date">
	<button id="mybtn">선택</button>
	<div id="boxoffice">
		<p><span id="pdate"></span> 박스 오피스 순위</p>
		<div></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script>
		const key = "3cc0c1799767eb81036640f8a421329d";
		window.onload = function () {
			// 1.어제날짜까지만 선택 가능 
			let y = new Date();
			y.setDate(y.getDate() - 1); //어제 날짜 세팅
			let str = y.getFullYear() + "-"
				+ ("0" + (y.getMonth() + 1)).slice(-2) + "-"
				+ ("0" + y.getDate()).slice(-2);
			document.querySelector("#date").max = str;
		}

		let url = "https://kobis.or.kr/kobisopenapi/webservice/rest/boxoffice/searchDailyBoxOfficeList.json?key="+key;

		mybtn.addEventListener("click", function () {
			let d = document.querySelector("#date").value; // yyyy-MM-dd => yyyyMMdd
			const regex = /-/g;
			let d_str = d.replace(regex, "");

			axios.get(url + "&targetDt=" + d_str)
				.then(function (response) {
					let data = response.data;
					document.querySelector("#pdate").innerHTML = data.boxOfficeResult.showRange;
					document.querySelector("#boxoffice div").innerHtml = "";
					//rank, movieNm, audiAcc, movieCd 
					let movieList = data.boxOfficeResult.dailyBoxOfficeList;

					for (let i in movieList) {
						let p = document.createElement("p");
						p.setAttribute("id", movieList[i].movieCd);
						p.textContent =	movieList[i].rank + "위 " + movieList[i].movieNm
							+ " : " + movieList[i].audiAcc + "명"
						document.querySelector("#boxoffice div").appendChild(p);//append
					}//for			
				})

		});	//click	

	 document.getElementById("boxoffice").addEventListener("click", async function (e) {
    const target = e.target;

    // <p> 태그이면서 id 속성이 있는 경우만 처리
    if (target.tagName === "P" && target.id) {
      // 기존 정보 제거
      const existingDiv = target.querySelector("div");
      if (existingDiv) existingDiv.remove();

      const movieCd = target.id;
      const url = "https://www.kobis.or.kr/kobisopenapi/webservice/rest/movie/searchMovieInfo.json";
      
      try {
        const res = await axios.get(url, {
          params: {
            key: key,
            movieCd: movieCd
          }
        });

        const m = res.data.movieInfoResult.movieInfo;
        const minfo = `
          <div>
            영화제목: ${m.movieNm}<br>
            오픈날짜: ${m.openDt}<br>
            제작국가: ${m.nations[0]?.nationNm || "정보 없음"}<br>
            감독: ${m.directors[0]?.peopleNm || "정보 없음"}
            <hr>
          </div>
        `;
// HTML 문자열을 동적으로 삽입 - ("위치", 문자열)
// "beforebegin"	기준 요소 바로 앞에 삽입	
// "afterbegin"	기준 요소 첫 번째 자식으로 삽입
// "beforeend"	기준 요소 마지막 자식으로 삽입	
// "afterend"	기준 요소 바로 뒤에 삽입

        target.insertAdjacentHTML("beforeend", minfo);
      } catch (err) {
        console.error("❌ 영화 정보를 가져오는 중 오류 발생:", err);
        target.insertAdjacentHTML("beforeend", `<div>오류 발생: ${err.message}</div>`);
      }
    }
  });
		
	</script>
</body>

</html>

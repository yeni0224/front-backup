<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>List item 1</li>
        <li>List item 2</li>
        <li>List item 3</li>
        <li>List item 4</li>
        <li>List item 5</li>
    </ul>
    <script>
        let list = document.getElementsByTagName('ul')[0];
        let allitems = list.getElementsByTagName('li');//배열

        for(let i = 0; i < allitems.length; i++){
            //자식 노드가 text인 경우 data 변수를 명시해야 해당 text를 꺼내온다
            document.write(allitems[i].firstChild.data);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="myform">
        <input type="text" name="text1" class="a">
        <input type="text" name="text2">
        <input type="button" value="확인" onclick="process()" class="a">
    </form>
    <div id="print"></div>
    <script>
        function process(){
            let aclass = document.getElementsByClassName('a');
            for (let a of aclass){alert(a.value)}
            let firstA = document.querySelector('.a'); 
            document.getElementById("print").innerHTML = firstA.value;
        }
    </script>
</body>
</html>

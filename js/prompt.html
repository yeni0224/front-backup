<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let age = prompt('나이를 입력하세요.','만나이로 입력합니다');
        document.write('나이' + age);
        document.write('<br>');
        //prompt()반환 값은 항상 str 타입이다.
        //str+int -> str + str(이어쓰기)
        document.write('10년 후 나이 : ' + (age + 10))
        let n_age1 = Number(age);
        document.write('10년 후 나이 다시 :' + (n_age1 + 10))
        document.write('<br>')

        let n_age2 = parseInt(age);
        document.write('10년 후 나이 구하기 2 :' + (n_age2+10));
        document.write('<br>')
        
        let n_age3 = parseFloat(age);
        document.write('10년 후 나이 구하기 2 :' + (n_age3+10));
        document.write('<br>')

        let name = '김솔데';
        let ages = 20;
        let job = '학생';
        document.write('이름은 ' + name + '나이는 ' + ages+'직업은 ' + job + '입니다');
        document.write(`이름은 ${name}, 나이는 ${ages}, 직업은 ${job}입니다`);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
</head>
<body>
    <p>css(link 태그)는 head 태그 안에 선언하고</p>
    <p>script 태그는 body 태그 제일 아래에 선언한다</p>
    <script>
        alert('메세지');
        alert(1000);//int값을 넣어주면 자동으로 문자열로 변환해서 출력

        let user = confirm("confirm()함수는 사용자의 답변을 전달한다");
        //document: 현재 화면에서 사용하는 문서
        //write(): <body> 영역에 출력
        document.write(user);


        </script>
    <script src="script.js"></script>
</body>
</html>

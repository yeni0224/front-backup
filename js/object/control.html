<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //if
        let number = 7;
 
        if (number % 2 === 0) {
            console.log("짝수입니다.");
        } else {
            console.log("홀수입니다.");
        }
        //switch
        let day = "월";
 
        switch (day) {
            case "월":
                console.log("한 주의 시작입니다.");
                break;
            case "금":
                console.log("불타는 금요일!");
                break;
            case "일":
                console.log("휴식의 날입니다.");
                break;
            default:
                console.log("평범한 하루입니다.");
        }
        //while
        let i = 1;
 
        while (i <= 5) {
            console.log(i);
            i++;
        }
        //dowhile
        let j = 6;
 
        do {
            console.log(j);
            j++;
        } while (j <= 5);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let x = [1,2,3];
        let y = [4,5,6];

        let concated = x.concat(y); //결과물 : 배열
        document.write(`x : ${x}<br>`)
        document.write(`concated : ${concated}<br><br>`)

        let joined = x.join('-') // 결과물 : 문자열
        document.write(`x : ${x}<br>`)
        document.write(`join : ${joined}<br><br>`)

    </script>
</body>
</html>

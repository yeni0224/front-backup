<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    new Promise((resolve, reject) => {
        setTimeout(() => resolve(1), 1000); // 1초 후 1 전달
    })
        .then(num => {
            console.log(num); // 1
            return num + 1;
        })
        .then(num => {
            console.log(num); // 2
            throw new Error('강제 예외 발생')
            return num * 2;
        })
        .then(num => {
            console.log(num); // 4
        })
        .catch(error => {
            console.error("에러:", error);
        }); // 하나라도 실패하면 catch()로 넘어옴
        //.catch()는 마지막에 한 번만 붙여도 전체 체인의 예외를 잡을 수 있습니다.
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="console" id="result"></div>
    <script>
       //fetch() : 서버에 요청 -> 응답을 받아옴(promise객체 반환)
       //fetch('파일 경로 혹은 url') 자체가 promise 객체이기 때문에 .으로 함수 연결
       //function asynctest(){ fetch('sample5_load.json').then().catch()}

        // function asynctest(){
        //     fetch('sample5_load.json')
        //     .then(response => response.json()) //전체 결과 중 json만 뽑아오겠다
        //     .then(json =>{
        //         f_name = json.employees[0].firstName;
        //         document.querySelector("#result").innerHTML = f_name;
        //     })//json 불러온 것 중 필요한 것만 뽑아오겠다
        //     .catch(err => {document.querySelector("#result").innerHTML = err;})
        // }
        
        async function asynctest(){
            try{
                let response = await fetch('sample5_load.json');//응답 받아온 다음
                let json = await response.json();//json을 js 객체로 가져옴

                let f_name = json.employees[0].firstName;
                document.querySelector('#result').innerHTML = f_name;
            } catch(err){document.querySelector('#result').innerHTML = err;}
        }
        asynctest()
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let s = 'One,Two,&nbspThree,Four,Five';
        let array = s.split(',');
        for (let i = 0; i < array.length; i++){
            document.write(`${i} : ${array[i]}<br>`)
        }
    </script>
</body>
</html>

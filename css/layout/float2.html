<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
    <title>박스모델</title>
    <style>
        .box1{
            padding:20px;
            margin-right:10px;
            background:#ffd800;
            float:left;
        }
        .box2 {
            background: #0094ff;
            padding:20px;
            margin-right:10px;
            float:left;
        }
        .box3 {
            background: #00ff21;
            padding:20px;
            float:left;
        }
        .box4 {
            background:#ffffff;
            padding:20px;
            float:right;
            border:1px solid black;
        }
        .box5{
            background:#CCC;
            padding:20px;
           /*clear: both;*/
        }
        /*부모태그에 overflow:hidden지정
        안에서 설정한 float가 감춰진다.*/
       #floatbox{overflow: hidden;}
    </style>
</head>
<body>
    <div id="floatbox">
        <div class="box1">박스1</div>
        <div class="box2">박스2</div>
        <div class="box3">박스3</div>
        <div class="box4">박스4</div>
    </div>
    <div class="box5">박스5</div>
   
</body>
</html>

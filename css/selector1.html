<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li{color:blue;} /*현재 문서의 모든 li 태그*/
        #target{color: crimson;}/*id가 target인 태그*/
        .green{background-color: greenyellow;}/*class가 green인 태그*/
        .center{text-align: center;}/*class가 center인 태그*/
    </style>
</head>
<body>
    <ul>
        <li id="target">TEXT TEXT TEXT TEXT TEXT TEXT</li>
        <li class="green center">TEXT TEXT TEXT TEXT TEXT TEXT</li><!--클래스 속성 여러 개 적을 때는 띄어쓰기만 하면 됨-->
        <li>TEXT TEXT TEXT TEXT TEXT TEXT</li>
        <li class="green">TEXT TEXT TEXT TEXT TEXT TEXT</li>
    </ul>
    <ol>
        <li>TEXT TEXT TEXT TEXT TEXT TEXT</li>
        <li class="green center">TEXT TEXT TEXT TEXT TEXT TEXT</li>
        <li>TEXT TEXT TEXT TEXT TEXT TEXT</li>
        <li>TEXT TEXT TEXT TEXT TEXT TEXT</li>
    </ol>
</body>
</html>
